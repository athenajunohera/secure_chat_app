<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/secure_chat_app_icon.png" />
  <link rel="apple-touch-icon" href="/secure_chat_app_icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fbfaf5">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Enchanted | The Gilded Sanctum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #fbfaf5;
    }

    #root {
      height: 100vh;
    }

    .font-spiritual {
      font-family: 'Cinzel', serif;
    }

    .font-mystic {
      font-family: 'Great Vibes', cursive;
    }

    .font-forest {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    // 1. Mobile Health Check (Safety First)
    window.onerror = function(msg, url, line) {
        alert("Enchanted Error Detected: " + msg + " (Line: " + line + ")");
        return false;
    };

    // 2. HTTPS Portal Check (Security Requirement)
    if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost') {
        window.location.href = window.location.href.replace('http:', 'https:');
    }

    // 3. Purge Ancient Spirits (Service Worker Cleanup)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log("Purification Success!");
        }
      });
    }
  </script>
  <script type="module" src="/src/main.jsx?v=1.2"></script>
</body>

</html>
